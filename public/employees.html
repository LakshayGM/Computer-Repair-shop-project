<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - RepairShop Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo-icon">⚡</span>
                <h2>RepairShop<span style="color:var(--primary);">Pro</span></h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Inventory Dashboard
                </a>
                <a href="transaction.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Transactions
                </a>
                <a href="employees.html" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Employees
                </a>
            </nav>
            <div style="padding: 1.5rem 1rem;">
                <button id="logoutBtn" class="btn btn-outline" style="width: 100%; border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Log Out
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-title">
                    <h1 style="font-size: 1.25rem;">Employee Management</h1>
                </div>
                <div class="topbar-actions">
                    <button id="themeToggleBtn" class="btn btn-outline" style="padding: 0.5rem; border-radius: 50%; border: none;" title="Toggle Dark/Light Mode">
                        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                    <div style="display: flex; align-items: center; gap: 0.75rem; margin-left: 0.5rem;">
                        <span id="navUsername" style="font-size: 0.9rem; font-weight: 500; color: var(--text-muted);">Welcome, Admin</span>
                        <div id="navAvatar" style="width: 36px; height: 36px; background-color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">A</div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-container" style="max-width: 900px; margin: 0 auto;">
                <!-- Employees Table Panel -->
                <div class="card" style="display: flex; flex-direction: column;">
                    <div class="card-header">
                        <h3 style="margin: 0; font-size: 1.1rem;">System Users & Employees</h3>
                        <span class="subtitle">List of personnel authorized to access the system</span>
                    </div>
                    <div class="table-responsive" style="flex: 1;">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Username</th>
                                    <th>Role / Access Level</th>
                                </tr>
                            </thead>
                            <tbody id="employeesBody">
                                <!-- Populated by script.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
